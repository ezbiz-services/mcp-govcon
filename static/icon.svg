<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <g transform="translate(100, 55)" fill="none" stroke="white" stroke-width="3">
    <!-- Capitol dome outline -->
    <path d="M-45,45 L-45,30 C-45,-10 45,-10 45,30 L45,45" stroke-width="3.5"/>
    <!-- Dome top -->
    <path d="M-25,20 C-25,-5 25,-5 25,20" stroke-width="2.5" opacity="0.7"/>
    <!-- Pillars -->
    <line x1="-35" y1="30" x2="-35" y2="45" stroke-width="4" stroke-linecap="round"/>
    <line x1="-15" y1="25" x2="-15" y2="45" stroke-width="4" stroke-linecap="round"/>
    <line x1="15" y1="25" x2="15" y2="45" stroke-width="4" stroke-linecap="round"/>
    <line x1="35" y1="30" x2="35" y2="45" stroke-width="4" stroke-linecap="round"/>
    <!-- Base -->
    <line x1="-50" y1="45" x2="50" y2="45" stroke-width="4" stroke-linecap="round"/>
    <!-- Spire -->
    <line x1="0" y1="-15" x2="0" y2="-5" stroke-width="3" stroke-linecap="round"/>
    <!-- Star at top -->
    <circle cx="0" cy="-18" r="4" fill="#fbbf24" stroke="none"/>
  </g>
  <!-- Search magnifier -->
  <g transform="translate(145, 120)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#60a5fa" stroke-width="3"/>
    <line x1="10" y1="10" x2="20" y2="20" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="100" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="white">GovCon</text>
</svg>
